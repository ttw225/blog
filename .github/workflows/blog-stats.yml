name: blog-stats

on:
  push:
    branches:
      - main
    paths:
      - "content/**"
      - "scripts/generate_blog_stats.py"
      - "Makefile"
      - ".github/workflows/blog-stats.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: "${{ secrets.PERSONAL_ACCESS_TOKEN }}"
          fetch-depth: 0

      - name: Generate stats
        run: make stats

      - name: Commit and push stats updates
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: github-actions[bot]@users.noreply.github.com
        run: |
          if git diff --quiet -- README.md docs/stats-latest.json docs/stats-endpoint.json docs/stats-endpoint-pairs.json docs/stats-endpoint-chars.json docs/stats-history.jsonl; then
            echo "No stats changes."
            exit 0
          fi
          git add README.md docs/stats-latest.json docs/stats-endpoint.json docs/stats-endpoint-pairs.json docs/stats-endpoint-chars.json docs/stats-history.jsonl
          git commit -m "auto: refresh blog stats"
          git push origin HEAD:main
